version: "3.9"

services:
  sre-copilot:
    image: ghcr.io/${GITHUB_REPOSITORY:-llmops-notes}/sre-copilot:${IMAGE_TAG:-latest}
    container_name: sre-copilot
    restart: unless-stopped
    ports:
      - "8055:8055"
    env_file:
      - .env
    environment:
      # Override for container networking
      SRE_MILVUS_URI: http://milvus:19530
      SRE_REDIS_URL: redis://sre-redis:6379/0
      SRE_LANGFUSE_BASE_URL: http://langfuse:3000
      SRE_OTEL_ENDPOINT: http://tempo:4317
      SRE_LOKI_URL: http://loki:3100
      SRE_PROM_URL: http://prometheus:9090
      SRE_TEMPO_URL: http://tempo:3200
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8055/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - milvus-net
    depends_on:
      - milvus
      - redis

  # Minimal dependencies for standalone deployment
  # For full infra, use ../infras/docker-compose.yml

  milvus:
    image: milvusdb/milvus:v2.4.8
    container_name: milvus-standalone
    restart: unless-stopped
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: sre-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  milvus-net:
    name: milvus-net
    external: true

volumes:
  milvus-data:
  redis-data:

